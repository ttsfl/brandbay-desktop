<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BrandBay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #dce8f8;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Decorative shapes matching BrandBay website */
    .shape {
      position: absolute;
      z-index: 0;
    }
    /* Orange quarter circle — bottom left corner */
    .shape-1 {
      width: 200px;
      height: 200px;
      background: #e8a87c;
      opacity: 0.35;
      bottom: 0;
      left: 0;
      border-radius: 0 100% 0 0;
    }
    /* Blue quarter circle — top right corner */
    .shape-2 {
      width: 160px;
      height: 160px;
      background: #2979ff;
      opacity: 0.15;
      top: 0;
      right: 0;
      border-radius: 0 0 0 100%;
    }
    /* Small blue circle — bottom right area */
    .shape-3 {
      width: 140px;
      height: 140px;
      background: #b8d4f0;
      opacity: 0.5;
      bottom: -40px;
      right: -20px;
      border-radius: 50%;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-container {
      margin-bottom: 28px;
    }

    .logo-img {
      height: 72px;
      width: auto;
    }

    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 16px;
      border: 3px solid rgba(41, 121, 255, 0.2);
      border-radius: 50%;
      border-top: 3px solid #2979ff;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message {
      font-size: 13px;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <!-- Decorative background shapes -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <div class="content">
    <div class="logo-container">
      <img src="assets/BrandBaySplashLogo.png" alt="BrandBay" class="logo-img" />
    </div>
    <div class="spinner"></div>
    <div class="message">Loading your brand experience...</div>
  </div>
</body>
</html>
